<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp — Development Projects Template</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #CE0E2D;
    --bg: #F2F2F2;
    --white: #FFFFFF;
    --text: #464646;
    --text-light: #767677;
    --text-muted: #888899;
  }

  html, body {
    width: 100%; height: 100%;
    background: #ddd;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .slide {
    width: 1920px; height: 1080px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    transform-origin: center center;
  }

  /* ============================================
     HEADER AREA
     ============================================ */
  .header-area {
    position: relative;
    width: 100%;
    height: 340px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.75) 50%, rgba(255,255,255,0.4) 100%),
      linear-gradient(120deg, #f5f5f5 0%, #e8e8e8 100%);
    overflow: hidden;
  }

  /* Subtle geometric decoration */
  .header-area::before {
    content: '';
    position: absolute;
    top: -60px; right: -40px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(206, 14, 45, 0.04);
  }
  .header-area::after {
    content: '';
    position: absolute;
    bottom: -80px; right: 200px;
    width: 250px; height: 250px;
    border-radius: 50%;
    background: rgba(206, 14, 45, 0.03);
  }

  .header-content {
    position: relative; z-index: 2;
    padding: 44px 64px 0;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .brand-line {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .brand-logo img {
    height: 20px;
    width: auto;
    display: block;
  }

  /* Red pill badge (header) */
  .pill-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 140px;
    padding: 8px 32px;
    background: var(--red);
    border-radius: 50px;
    color: var(--white);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(206, 14, 45, 0.25);
  }

  /* ============================================
     CARDS
     ============================================ */
  .cards-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    padding: 28px 64px 0;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 32px 30px 28px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
    position: relative;
    min-height: 347px;
  }

  .card-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 24px;
    background: var(--red);
    border-radius: 50px;
    color: var(--white);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 22px;
  }

  /* ============================================
     TECH BAR
     ============================================ */
  .tech-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 22px 64px 0;
    flex-wrap: wrap;
  }

  .tech-bar-label {
    font-size: 12px; font-weight: 600;
    color: var(--red);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-right: 8px;
  }

  .tech-chip {
    padding: 6px 16px;
    background: var(--white);
    border-radius: 50px;
    font-size: 12px; font-weight: 500;
    color: var(--text);
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    letter-spacing: 0.3px;
  }

  @media screen {
    .slide {
      transform: scale(calc(min(100vw / 1920, 100vh / 1080)));
    }
  }
</style>
</head>
<body>

<div class="slide">

  <!-- ===== HEADER AREA ===== -->
  <div class="header-area">
    <div class="header-content">
      <div class="header-top">
        <div class="brand-line">
          <span class="brand-logo"><img src="timestamp-logo.png" alt="timestamp"></span>
          <!-- texto adicional al lado del logo -->
        </div>
      </div>

      <!-- ===== CONTENIDO DEL HEADER VA AQUÍ ===== -->

    </div>
  </div>

  <!-- ===== CONTENIDO PRINCIPAL VA AQUÍ ===== -->

  <!-- ===== TECH STACK BAR ===== -->
  <div class="tech-bar">
    <!-- Cambiar por las tecnologías del proyecto -->
  </div>

</div>

<script>
  function scaleSlide() {
    const slide = document.querySelector('.slide');
    const scaleX = window.innerWidth / 1920;
    const scaleY = window.innerHeight / 1080;
    const scale = Math.min(scaleX, scaleY);
    slide.style.transform = `scale(${scale})`;
  }
  scaleSlide();
  window.addEventListener('resize', scaleSlide);
</script>

</body>
</html>
